# Upstream backend servers
# Docker Compose will automatically resolve 'backend' to all scaled instances
upstream backend_servers {
    least_conn;  # Distribute to server with least connections

    # Docker's internal DNS will resolve this to all backend replicas
    # resolver enables dynamic DNS resolution for scaled services
    server backend:8081 max_fails=3 fail_timeout=30s;

    # Connection pooling for better performance
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# HTTP Server - Redirect to HTTPS in production
server {
    listen 80;
    server_name localhost;

    # For Let's Encrypt SSL certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS (uncomment in production with SSL)
    # return 301 https://$server_name$request_uri;

    # For development/staging, proxy to backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn addr 10;

        proxy_pass http://backend_servers;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Add upstream server info to response header (for debugging)
        add_header X-Upstream-Server $upstream_addr always;
        add_header X-Response-Time $upstream_response_time always;

        # Timeouts - reduced for faster failure detection
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Load balancing retry logic
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # Special rate limiting for authentication endpoints
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI endpoints - Longer timeout for AI processing (Gemini/DeepSeek can be slow)
    location /api/ai/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend_servers;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Extended timeouts for AI processing
        # DeepSeek API can take 30-40 seconds, Gemini is faster but can also be slow
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;     # Increased from 30s
        proxy_read_timeout 90s;     # Increased from 30s - AI needs time to process

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;       # Increased for AI responses
        proxy_buffers 16 8k;        # Increased for AI responses
        proxy_busy_buffers_size 16k;

        # Add upstream info
        add_header X-Upstream-Server $upstream_addr always;
        add_header X-Response-Time $upstream_response_time always;
    }

    # Admin AI endpoints - Same extended timeout as /api/ai/
    location ~ ^/api/admin/dashboard/ai- {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend_servers;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Extended timeouts for AI processing
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;

        # Add upstream info
        add_header X-Upstream-Server $upstream_addr always;
        add_header X-Response-Time $upstream_response_time always;
    }

    # Health check endpoint
    location /api/actuator/health {
        proxy_pass http://backend_servers;
        access_log off;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend_servers;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

