# Development Environment Configuration
# This profile is used for LOCAL development (testing with Postman on localhost)

# Server Configuration - LOCAL PORT
server.port=8080
server.servlet.context-path=/api

# Database Configuration - DOCKER PostgreSQL
# Port 5433 để kết nối tới PostgreSQL trong Docker (mapped from 5432 inside container)
spring.datasource.url=jdbc:postgresql://localhost:5433/thuctaptotnghiep
spring.datasource.username=postgres
spring.datasource.password=REMOVED
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration for Development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration - LOCAL
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# Auto-flush Redis cache on startup (useful for development)
# Ensures fresh cache after code changes and prevents stale serialization errors
spring.cache.redis.flush-on-startup=false

# Kafka Configuration - LOCAL
# ENABLED for local development with Docker Kafka
spring.kafka.enabled=true
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=ecommerce-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Email Configuration - Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nganhvan1609@gmail.com
spring.mail.password=REMOVED
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender info
spring.mail.from=nganhvan1609@gmail.com
spring.mail.from-name=E-commerce Fashion Store

# Development Logging
logging.level.root=INFO
logging.level.com.ut.edu.backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Security - Relaxed for development
security.require-ssl=false

# CORS - Allow local frontend
cors.allowed.origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000

# API Documentation - Enabled for development
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Actuator - All endpoints for development
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# AI Configuration - Gemini (Primary) + DeepSeek (Backup)
# Using only Gemini and DeepSeek - OpenAI removed
gemini.api.key=REMOVED
gemini.api.model=gemini-1.5-flash
gemini.api.temperature=0.7
gemini.api.max-tokens=1000

# DeepSeek API - Backup when Gemini fails
deepseek.api.key=${DEEPSEEK_API_KEY:REMOVED}
deepseek.api.model=deepseek-chat
deepseek.api.temperature=0.7
deepseek.api.max-tokens=1000

# AI Fallback Configuration
ai.fallback.enabled=true
ai.fallback.retry.max-attempts=2
ai.fallback.retry.delay-ms=1000
