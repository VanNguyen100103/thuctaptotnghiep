# Production Environment Configuration
# This profile is used for PRODUCTION deployment
# IMPORTANT: All sensitive data MUST be set via environment variables

# Server Configuration - PRODUCTION PORT
server.port=${PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.http2.enabled=true

# Database Configuration - PRODUCTION (use environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/thuctaptotnghiep}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool - Production optimized
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration - PRODUCTION
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5

# Kafka Configuration - PRODUCTION
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=ecommerce-prod-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.compression-type=snappy

# Email Configuration - PRODUCTION
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}

# Production Logging - Minimal for performance
logging.level.root=WARN
logging.level.com.ut.edu.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.file.name=/var/log/ecommerce/application.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Security - OWASP Top 10 Compliance - PRODUCTION
security.require-ssl=true
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# JWT - MUST use environment variables in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# CORS - Restrict to production frontend only
cors.allowed.origins=${CORS_ORIGINS}
cors.allowed.methods=GET,POST,PUT,DELETE,PATCH
cors.allowed.headers=Authorization,Content-Type,X-CSRF-TOKEN
cors.allow.credentials=true
cors.max.age=3600

# API Documentation - DISABLED in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator - Minimal endpoints for production
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=true

# Rate Limiting - Strict in production
rate.limit.enabled=true
rate.limit.requests-per-minute=60
rate.limit.requests-per-hour=1000

# Security Headers (OWASP)
security.headers.xss-protection=1; mode=block
security.headers.content-type-options=nosniff
security.headers.frame-options=DENY
security.headers.hsts=max-age=31536000; includeSubDomains

# Session Security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Production optimizations
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# AI Configuration - PRODUCTION (use environment variables)
# AI Configuration - Gemini (Primary) + DeepSeek (Backup)
# Using only Gemini and DeepSeek - OpenAI removed
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=${GEMINI_MODEL:gemini-1.5-flash}
gemini.api.temperature=0.7
gemini.api.max-tokens=1000

# DeepSeek API - Backup when Gemini fails
deepseek.api.key=${DEEPSEEK_API_KEY}
deepseek.api.model=${DEEPSEEK_MODEL:deepseek-chat}
deepseek.api.temperature=0.7
deepseek.api.max-tokens=1000

# AI Fallback Configuration
ai.fallback.enabled=true
ai.fallback.retry.max-attempts=2
ai.fallback.retry.delay-ms=1000
