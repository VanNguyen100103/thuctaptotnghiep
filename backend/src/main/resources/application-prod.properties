# Production Environment Configuration
# This profile is used for PRODUCTION deployment with Docker Compose
# Based on staging configuration with production optimizations

# Server Configuration - DOCKER PORT (same as staging)
server.port=8081
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.http2.enabled=true

# Database Configuration - Support both Docker and Cloud (Render)
# For Docker: postgres:5432
# For Render: use DB_HOST environment variable
# sslmode: 'prefer' works for local Docker; Neon requires DB_SSLMODE=require
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:thuctaptotnghiep}?sslmode=${DB_SSLMODE:prefer}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool - Optimized for low memory (Render 512MB)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration for Production
# IMPORTANT: Use 'validate' in production to prevent schema changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration - Support both Docker and Cloud
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Upstash requires TLS -> set REDIS_SSL=true on Render
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5

# Do not flush Redis cache on startup in production (preserve sessions)
spring.cache.redis.flush-on-startup=false

# Kafka Configuration - Support both Docker and Cloud
# Set KAFKA_ENABLED=false on Render if not using external Kafka
spring.kafka.enabled=${KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=ecommerce-prod-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.compression-type=snappy

# Email Configuration - PRODUCTION (use environment variables)
# Brevo API (preferred for Render - HTTP API, free plan 300 emails/day has no expiration)
brevo.api.key=${BREVO_API_KEY:}

# SendGrid API (fallback - free plan retired 2025, works only during 60-day trial)
sendgrid.api.key=${SENDGRID_API_KEY:}

# SMTP Fallback (will fail on Render free tier due to port blocking)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_USERNAME:}
spring.mail.from-name=E-commerce Fashion Store
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Production Logging - Minimal for performance
logging.level.root=WARN
logging.level.com.ut.edu.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka=WARN
logging.file.name=/var/log/ecommerce/application.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Security - OWASP Top 10 Compliance
security.require-ssl=false
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# JWT - MUST use environment variables in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:86400000}

# CORS - Restrict to production frontend only
cors.allowed.origins=${CORS_ORIGINS:https://thuctaptotnghiep-frontend.vercel.app}
cors.allowed.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allow.credentials=true
cors.max.age=3600

# API Documentation - DISABLED in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator - Minimal endpoints for production
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
# Disable health checks for services that cannot succeed on Render:
# SMTP ports are blocked (email goes through Brevo HTTP API) and
# Elasticsearch is intentionally not deployed on the free-tier demo
management.health.mail.enabled=false
management.health.elasticsearch.enabled=false
management.metrics.export.prometheus.enabled=true

# Rate Limiting - Strict in production
rate.limit.enabled=true
rate.limit.requests-per-minute=60
rate.limit.requests-per-hour=1000

# Security Headers (OWASP)
security.headers.xss-protection=1; mode=block
security.headers.content-type-options=nosniff
security.headers.frame-options=DENY
security.headers.hsts=max-age=31536000; includeSubDomains

# Session Security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Production optimizations
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# AI Configuration - DeepSeek (only provider)
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.model=${DEEPSEEK_MODEL:deepseek-chat}
deepseek.api.temperature=0.7
deepseek.api.max-tokens=1000

# AI Fallback Configuration
ai.fallback.enabled=true
ai.fallback.retry.max-attempts=2
ai.fallback.retry.delay-ms=1000
