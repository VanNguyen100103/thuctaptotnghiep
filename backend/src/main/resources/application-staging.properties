# Staging Environment Configuration
# This profile is used when running in Docker containers for staging/testing

# Server Configuration - DOCKER PORT (different from local)
server.port=8081
server.servlet.context-path=/api

# Database Configuration - DOCKER PostgreSQL Service
spring.datasource.url=jdbc:postgresql://postgres:5432/thuctaptotnghiep
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration for Staging
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis Configuration - DOCKER Service
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=10
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=2

# Auto-flush Redis cache on startup (useful for staging to prevent stale cache)
# Ensures fresh cache after deployments and code changes
# DISABLED to preserve cart and user session data between restarts
spring.cache.redis.flush-on-startup=false

# Kafka Configuration - DOCKER Service
spring.kafka.enabled=true
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=ecommerce-staging-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# AI Configuration - DISABLED (using MockAIService)
spring.ai.enabled=false
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=gpt-3.5-turbo
# spring.ai.openai.chat.options.temperature=0.7

# Email Configuration (use real SMTP for staging)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_USERNAME:}
spring.mail.from-name=E-commerce Fashion Store
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Staging Logging
logging.level.root=WARN
logging.level.com.ut.edu.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka=WARN
logging.file.name=/var/log/ecommerce/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# Security - Enable SSL checks
security.require-ssl=false

# CORS - Allow staging frontend
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://staging-frontend:3000}

# API Documentation - Enabled for staging
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Actuator - Limited endpoints for staging
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Rate Limiting - More restrictive in staging
rate.limit.enabled=true
rate.limit.requests-per-minute=100

# DeepSeek API - Backup when Gemini fails
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.model=deepseek-chat
deepseek.api.temperature=0.7
deepseek.api.max-tokens=1000

# AI Fallback Configuration
ai.fallback.enabled=true
ai.fallback.retry.max-attempts=2
ai.fallback.retry.delay-ms=1000