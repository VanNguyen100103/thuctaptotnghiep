# Test profile - used by integration tests (Testcontainers provides PostgreSQL/Redis)
# Datasource and Redis connection details are injected by @ServiceConnection.

# Kafka off: async flows run synchronously in tests
spring.kafka.enabled=false

# Quiet logs
logging.level.root=WARN
logging.level.com.ut.edu.backend=INFO

# No devtools restart during tests
spring.devtools.restart.enabled=false
