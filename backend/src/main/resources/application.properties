# Application Name
spring.application.name=backend

# Server Port
server.port=8081

# Active Profile (change to: dev, staging, prod)
spring.profiles.active=dev

# Docker Compose (disable if not using Docker)
spring.docker.compose.enabled=false

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Session Configuration
spring.session.store-type=redis
spring.session.timeout=86400

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=WARN
logging.level.com.ut.edu.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=WARN

# JWT Configuration (use environment variables for production)
jwt.secret=${JWT_SECRET:REMOVED}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Cloudinary Configuration
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:dxxdhz5f5}
cloudinary.api.key=${CLOUDINARY_API_KEY:REMOVED}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:REMOVED}
cloudinary.secure=${CLOUDINARY_SECURE:true}

# PayPal Configuration
paypal.client.id=${PAYPAL_CLIENT_ID:REMOVED}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:REMOVED}
paypal.mode=${PAYPAL_MODE:sandbox}
# Exchange rate: 1 USD = 25000 VND (adjust as needed)
paypal.exchange.rate.vnd-to-usd=${PAYPAL_EXCHANGE_RATE:25000}

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:8080
cors.allowed.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Application Configuration
app.name=E-commerce Fashion Store
app.frontend.url=http://localhost:3000

# AI Configuration - Gemini (Primary) + DeepSeek (Backup)
# Using only Gemini and DeepSeek - OpenAI removed
gemini.api.key=${GEMINI_API_KEY:REMOVED}
gemini.api.model=gemini-2.0-flash-exp
gemini.api.temperature=0.7
gemini.api.max-tokens=1000

# DeepSeek API - Backup when Gemini fails
deepseek.api.key=${DEEPSEEK_API_KEY:REMOVED}
deepseek.api.model=deepseek-chat
deepseek.api.temperature=0.7
deepseek.api.max-tokens=1000

# AI Fallback Configuration
ai.fallback.enabled=true
ai.fallback.retry.max-attempts=3
ai.fallback.retry.delay-ms=1000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nganhvan1609@gmail.com
spring.mail.password=REMOVED
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000