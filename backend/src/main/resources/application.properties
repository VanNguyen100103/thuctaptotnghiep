# Application Name
spring.application.name=backend

# Server Port
server.port=8081

# Active Profile (change to: dev, staging, prod)
spring.profiles.active=dev

# Docker Compose (disable if not using Docker)
spring.docker.compose.enabled=false

# JPA Configuration
# Schema is managed by Flyway (src/main/resources/db/migration) - Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migrations
# baseline-on-migrate: existing databases (schema created by Hibernate before Flyway
# was adopted) are marked as version 1 and skip V1__baseline.sql; empty databases
# run all migrations from V1. New schema changes go in V2, V3, ...
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Session Configuration
spring.session.store-type=redis
spring.session.timeout=86400

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=WARN
logging.level.com.ut.edu.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=WARN

# JWT Configuration (use environment variables for production)
# Default below is a DEV-ONLY placeholder; prod profile requires JWT_SECRET (no default)
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-production-0123456789abcdefghijklmnop}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Cloudinary Configuration (set values in .env - see .env.example)
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api.key=${CLOUDINARY_API_KEY:}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:}
cloudinary.secure=${CLOUDINARY_SECURE:true}

# PayPal Configuration (set values in .env - see .env.example)
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
paypal.mode=${PAYPAL_MODE:sandbox}
# Exchange rate: 1 USD = 25000 VND (adjust as needed)
paypal.exchange.rate.vnd-to-usd=${PAYPAL_EXCHANGE_RATE:25000}

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:8080
cors.allowed.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Application Configuration
app.name=E-commerce Fashion Store
app.frontend.url=http://localhost:3000

# AI Configuration - DeepSeek (only provider)
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.model=deepseek-chat
deepseek.api.temperature=0.7
deepseek.api.max-tokens=1000

# AI Fallback Configuration
ai.fallback.enabled=true
ai.fallback.retry.max-attempts=3
ai.fallback.retry.delay-ms=1000

# Brevo API (preferred - HTTP API works on Render, free plan 300 emails/day has no expiration)
brevo.api.key=${BREVO_API_KEY:}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000